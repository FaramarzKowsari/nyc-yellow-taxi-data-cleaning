name: Bug report
description: Report a reproducible defect in code, tests, or documentation.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands, input type, and relevant file paths.
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include logs, tracebacks, or screenshots when useful.
